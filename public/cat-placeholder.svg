  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect x="120" y="120" width="960" height="960" rx="12" fill="none" stroke="#2a2a2a" stroke-width="4"/>
  <rect x="220" y="900" width="760" height="12" fill="url(#accent)"/>
  <text x="50%" y="50%" fill="#f4f4f5" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" text-anchor="middle" dominant-baseline="middle">SEM IMAGEM</text>
  <text x="50%" y="58%" fill="#7a7a7a" font-family="Arial, Helvetica, sans-serif" font-size="28" text-anchor="middle" dominant-baseline="middle">Categoria</text>
